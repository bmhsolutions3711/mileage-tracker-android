<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#e5b524">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Mileage Tracker</title>
<link rel="manifest" href="manifest.json?v=2">
<link rel="icon" href="icon-192.png?v=2">
<link rel="apple-touch-icon" href="icon-192.png?v=2">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --chrome: #e8e8ec;
    --mid: #86868b;
    --dim: #555;
    --yellow: #e5b524;
    --green: #10b981;
    --red: #ef4444;
    --orange: #f97316;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--chrome);
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
  }
  .header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  .logo { font-size: 14px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
  .logo .y { color: var(--yellow); }
  .build-pill {
    font-size: 9px;
    color: var(--dim);
    font-family: 'SF Mono', 'Roboto Mono', monospace;
    margin-left: 8px;
  }
  .status-pill {
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 99px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .status-pill.idle { background: rgba(136,136,139,0.2); color: var(--mid); }
  .status-pill.tracking { background: rgba(16,185,129,0.18); color: var(--green); }
  .status-pill.error { background: rgba(239,68,68,0.2); color: var(--red); }

  .main {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 100px;
  }

  .hero {
    text-align: center;
    padding: 24px 0 12px;
  }
  .hero-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 8px;
  }
  .hero-value {
    font-family: 'SF Mono', 'Roboto Mono', monospace;
    font-size: 64px;
    font-weight: 600;
    color: var(--chrome);
    line-height: 1;
    letter-spacing: -2px;
  }
  .hero-unit {
    font-size: 16px;
    color: var(--mid);
    margin-top: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .quick-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 24px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .stat-value {
    font-family: 'SF Mono', 'Roboto Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--yellow);
  }
  .stat-label {
    font-size: 10px;
    color: var(--mid);
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .section-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--mid);
    margin: 24px 0 10px;
    font-weight: 700;
  }

  .day-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .day-row.synced { opacity: 0.55; }
  .day-date { font-size: 13px; color: var(--chrome); font-weight: 500; }
  .day-meta { font-size: 10px; color: var(--mid); margin-top: 2px; }
  .day-miles {
    font-family: 'SF Mono', 'Roboto Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: var(--yellow);
  }
  .day-miles .unit { font-size: 11px; color: var(--mid); margin-left: 3px; }

  .empty {
    text-align: center;
    color: var(--dim);
    font-size: 13px;
    padding: 40px 20px;
  }

  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s, transform 0.05s;
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; }
  .btn-primary { background: var(--yellow); color: #1a1a1a; }
  .btn-stop { background: var(--red); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--chrome); border: 1px solid var(--border); }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 16px;
    right: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--chrome);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    text-align: center;
    transform: translateY(20px);
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s;
    z-index: 100;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  .settings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    font-size: 13px;
  }
  .settings-row label { color: var(--mid); }
  .settings-row input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--chrome);
    padding: 8px 12px;
    border-radius: 6px;
    width: 140px;
    text-align: right;
    font-family: inherit;
    font-size: 13px;
  }
  .settings-row input:focus { outline: 1px solid var(--yellow); border-color: var(--yellow); }

  /* Auth gate overlay */
  .auth-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 24px;
  }
  .auth-overlay h2 { font-size: 18px; margin-bottom: 16px; color: var(--yellow); }
  .auth-overlay input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--chrome);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 16px;
    width: 100%;
    max-width: 300px;
    text-align: center;
    font-family: inherit;
  }
  .auth-overlay input:focus { outline: 1px solid var(--yellow); border-color: var(--yellow); }
  .auth-overlay button {
    margin-top: 12px;
    background: var(--yellow);
    color: #1a1a1a;
    border: none;
    padding: 14px 32px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
  }
  .auth-overlay .err { color: var(--red); font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>

<div id="authOverlay" class="auth-overlay" style="display:none">
  <h2>Mileage Tracker</h2>
  <input id="authToken" type="password" placeholder="Enter token">
  <button id="authSubmit">Connect</button>
  <div id="authErr" class="err"></div>
</div>

<div class="header">
  <div class="logo"><span class="y">MILEAGE</span> TRACKER <span class="build-pill" id="buildPill">v3</span></div>
  <div id="statusPill" class="status-pill idle">IDLE</div>
</div>

<div class="main">

  <div class="hero">
    <div class="hero-label">Today</div>
    <div class="hero-value" id="todayMiles">0.0</div>
    <div class="hero-unit">Miles</div>
  </div>

  <div class="quick-stats">
    <div class="stat">
      <div class="stat-value" id="weekMiles">0.0</div>
      <div class="stat-label">This Week</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="speedDisplay">&mdash;</div>
      <div class="stat-label">Speed (mph)</div>
    </div>
  </div>

  <div class="quick-stats" style="margin-top:10px">
    <div class="stat">
      <div class="stat-value" id="fixCount" style="font-size:18px">0</div>
      <div class="stat-label">GPS Fixes</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="countedCount" style="font-size:18px;color:var(--green)">0</div>
      <div class="stat-label">Counted</div>
    </div>
  </div>
  <div id="lastFixInfo" style="text-align:center;font-size:11px;color:var(--dim);margin-top:8px;font-family:'SF Mono','Roboto Mono',monospace"></div>

  <div class="section-title">Daily Log</div>
  <div id="dayList"></div>

  <div class="section-title">Settings</div>
  <div class="settings-row">
    <label>Min speed (mph) to count</label>
    <input type="number" id="minSpeed" value="3" min="0" max="20" step="1">
  </div>
  <div class="settings-row">
    <label>Last sync</label>
    <span id="lastSync" style="color:var(--mid);font-family:'SF Mono','Roboto Mono',monospace;font-size:12px">never</span>
  </div>

</div>

<div id="toast" class="toast"></div>

<div class="footer">
  <button id="btnTrack" class="btn btn-primary">Start Tracking</button>
  <button id="btnSync" class="btn btn-secondary">Sync to BIK</button>
</div>

<script>
'use strict';

const BUILD = 'v3-native';
const API_BASE = 'https://bryans-macbook-pro-1.tail1ed408.ts.net:8440/api/finance';
const TOKEN_KEY = 'mileage_token';

// ── Native platform detection ───────────────────────────────────────────
const IS_NATIVE = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
const BgGeo = IS_NATIVE ? window.Capacitor.Plugins.BackgroundGeolocation : null;
let bgWatcherId = null;

// ── Config ──────────────────────────────────────────────────────────────
const DB_NAME = 'mileage-tracker';
const DB_VERSION = 1;
const STORE_DAYS = 'days';
const STORE_META = 'meta';
const EARTH_R_MI = 3958.8;

// ── State ───────────────────────────────────────────────────────────────
let db = null;
let watchId = null;
let lastFix = null;
let todayDate = localDateStr();
let todayMiles = 0;
let weekMiles = 0;
let isTracking = false;
let wakeLock = null;

// ── DOM ─────────────────────────────────────────────────────────────────
const $ = (id) => document.getElementById(id);

// ── Auth ────────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem(TOKEN_KEY); }
function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }

function authHeaders() {
  const t = getToken();
  return t ? { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
}

async function checkAuth() {
  const token = getToken();
  if (!token) { showAuthGate(); return false; }
  try {
    const res = await fetch(API_BASE + '/mileage?days=1', { headers: authHeaders() });
    if (res.status === 401 || res.status === 403) { showAuthGate('Token rejected'); return false; }
    return true;
  } catch {
    // Backend unreachable — allow offline use, sync will fail later
    return true;
  }
}

function showAuthGate(err) {
  $('authOverlay').style.display = 'flex';
  if (err) $('authErr').textContent = err;
  $('authSubmit').addEventListener('click', tryAuth);
  $('authToken').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryAuth(); });
}

async function tryAuth() {
  const val = $('authToken').value.trim();
  if (!val) return;
  $('authErr').textContent = '';
  try {
    const res = await fetch(API_BASE + '/mileage?days=1', {
      headers: { 'Authorization': 'Bearer ' + val, 'Content-Type': 'application/json' }
    });
    if (res.ok) {
      setToken(val);
      $('authOverlay').style.display = 'none';
      init();
    } else {
      $('authErr').textContent = 'Invalid token';
    }
  } catch {
    // Backend offline — accept token optimistically
    setToken(val);
    $('authOverlay').style.display = 'none';
    init();
  }
}

// ── Helpers ─────────────────────────────────────────────────────────────
function localDateStr(d = new Date()) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function haversineMiles(lat1, lng1, lat2, lng2) {
  const toRad = (deg) => deg * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLng / 2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return EARTH_R_MI * c;
}

function setStatus(label, cls) {
  const el = $('statusPill');
  el.textContent = label;
  el.className = 'status-pill ' + cls;
}

function showToast(msg, type = '') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => { t.className = 'toast' + (type ? ' ' + type : ''); }, 2800);
}

function fmtMiles(n) { return (n || 0).toFixed(1); }
function round2(n) { return Math.round(n * 100) / 100; }

// ── IndexedDB ───────────────────────────────────────────────────────────
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_DAYS)) {
        d.createObjectStore(STORE_DAYS, { keyPath: 'date' });
      }
      if (!d.objectStoreNames.contains(STORE_META)) {
        d.createObjectStore(STORE_META, { keyPath: 'key' });
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbGet(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(store, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(value);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbAll(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function getMeta(key, fallback = null) {
  const r = await dbGet(STORE_META, key);
  return r ? r.value : fallback;
}
async function setMeta(key, value) {
  return dbPut(STORE_META, { key, value });
}

// ── GPS tracking ────────────────────────────────────────────────────────
async function loadToday() {
  const today = await dbGet(STORE_DAYS, todayDate);
  todayMiles = today ? today.miles : 0;
  $('todayMiles').textContent = fmtMiles(todayMiles);
}

async function recomputeWeek() {
  const all = await dbAll(STORE_DAYS);
  const now = new Date();
  const dow = now.getDay();
  const daysSinceMon = (dow + 6) % 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - daysSinceMon);
  const monStr = localDateStr(monday);
  weekMiles = all
    .filter(d => d.date >= monStr)
    .reduce((s, d) => s + (d.miles || 0), 0);
  $('weekMiles').textContent = fmtMiles(weekMiles);
}

async function persistToday(extraDelta) {
  const existing = await dbGet(STORE_DAYS, todayDate);
  const next = {
    date: todayDate,
    miles: round2((existing ? existing.miles : 0) + extraDelta),
    synced: false,
    last_lat: lastFix ? lastFix.lat : null,
    last_lng: lastFix ? lastFix.lng : null,
    last_t: lastFix ? lastFix.t : null,
  };
  await dbPut(STORE_DAYS, next);
  todayMiles = next.miles;
  $('todayMiles').textContent = fmtMiles(todayMiles);
  await recomputeWeek();
}

let _fixCount = 0;
let _countedCount = 0;

async function onPosition(pos) {
  const { latitude: lat, longitude: lng, speed, accuracy } = pos.coords;
  const t = pos.timestamp;
  let speedMps = (speed === null || isNaN(speed)) ? null : speed;

  _fixCount++;
  $('fixCount').textContent = _fixCount;

  const nowDate = localDateStr();
  if (nowDate !== todayDate) {
    todayDate = nowDate;
    todayMiles = 0;
    $('todayMiles').textContent = '0.0';
    lastFix = null;
  }

  let dist = 0;
  if (lastFix) {
    const dtMs = t - lastFix.t;
    if (dtMs > 0 && dtMs < 5 * 60 * 1000) {
      dist = haversineMiles(lastFix.lat, lastFix.lng, lat, lng);
      if (speedMps === null) {
        speedMps = (dist * 1609.34) / (dtMs / 1000);
      }
    }
  }

  const speedMph = speedMps !== null ? speedMps * 2.23694 : 0;
  $('speedDisplay').textContent = speedMph >= 1 ? speedMph.toFixed(0) : '0';

  if (lastFix) {
    const minSpeed = parseFloat($('minSpeed').value) || 0;
    const passSpeed = speedMph >= minSpeed;
    const sane = dist > 0 && dist < 1.0;
    const accOk = !accuracy || accuracy < 100;
    if (passSpeed && sane && accOk) {
      await persistToday(dist);
      _countedCount++;
      $('countedCount').textContent = _countedCount;
    }
    $('lastFixInfo').textContent =
      `${speedMph.toFixed(1)} mph · ${(dist * 5280).toFixed(0)} ft · acc ${accuracy ? accuracy.toFixed(0) : '?'}m · ` +
      (passSpeed ? (sane ? (accOk ? 'counted' : 'low acc') : 'jump') : 'too slow');
  } else {
    $('lastFixInfo').textContent = 'first fix · acc ' + (accuracy ? accuracy.toFixed(0) + 'm' : '?');
  }
  lastFix = { lat, lng, t, speed: speedMps };
}

function onPosError(err) {
  console.warn('[geo]', err);
  setStatus('GPS ERR', 'error');
  showToast('GPS error: ' + err.message, 'error');
}

async function startTracking() {
  if (!IS_NATIVE && !('geolocation' in navigator)) {
    showToast('No geolocation API', 'error');
    return;
  }
  isTracking = true;
  setStatus('TRACKING', 'tracking');
  $('btnTrack').textContent = 'Stop';
  $('btnTrack').classList.remove('btn-primary');
  $('btnTrack').classList.add('btn-stop');
  await setMeta('was_tracking', true);

  if (IS_NATIVE && BgGeo) {
    try {
      bgWatcherId = await BgGeo.addWatcher({
        backgroundMessage: 'Logging miles for tax records. Tap to open.',
        backgroundTitle: 'Mileage Tracker — Active',
        requestPermissions: true,
        stale: false,
        distanceFilter: 20,
      }, (location, error) => {
        if (error) {
          console.warn('[bggeo]', error);
          if (error.code === 'NOT_AUTHORIZED') {
            showToast('Location permission denied. Open Android settings → grant Always.', 'error');
          }
          return;
        }
        onPosition({
          coords: {
            latitude: location.latitude,
            longitude: location.longitude,
            speed: location.speed,
            accuracy: location.accuracy,
          },
          timestamp: location.time || Date.now(),
        });
      });
    } catch (e) {
      console.error('[bggeo] addWatcher failed', e);
      showToast('Native GPS failed: ' + (e.message || e), 'error');
      isTracking = false;
      setStatus('IDLE', 'idle');
      return;
    }
  } else {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch (e) { /* ignore */ }

    watchId = navigator.geolocation.watchPosition(onPosition, onPosError, {
      enableHighAccuracy: true,
      maximumAge: 2000,
      timeout: 30000,
    });
  }
}

async function stopTracking() {
  isTracking = false;
  if (IS_NATIVE && BgGeo && bgWatcherId) {
    try { await BgGeo.removeWatcher({ id: bgWatcherId }); } catch (e) { /* ignore */ }
    bgWatcherId = null;
  }
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  if (wakeLock) {
    try { await wakeLock.release(); } catch (e) { /* ignore */ }
    wakeLock = null;
  }
  setStatus('IDLE', 'idle');
  $('btnTrack').textContent = 'Start Tracking';
  $('btnTrack').classList.remove('btn-stop');
  $('btnTrack').classList.add('btn-primary');
  $('speedDisplay').textContent = '—';
  await setMeta('was_tracking', false);
  lastFix = null;
}

// ── Render daily log ────────────────────────────────────────────────────
async function renderDays() {
  const all = await dbAll(STORE_DAYS);
  all.sort((a, b) => a.date < b.date ? 1 : -1);
  const recent = all.slice(0, 14);
  const list = $('dayList');
  if (!recent.length) {
    list.innerHTML = '<div class="empty">No miles logged yet.<br>Tap Start Tracking to begin.</div>';
    return;
  }
  list.innerHTML = recent.map(d => {
    const dt = new Date(d.date + 'T00:00:00');
    const label = dt.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
    return `<div class="day-row${d.synced ? ' synced' : ''}">
      <div>
        <div class="day-date">${label}</div>
        <div class="day-meta">${d.synced ? 'synced' : 'pending'}</div>
      </div>
      <div class="day-miles">${fmtMiles(d.miles)}<span class="unit">mi</span></div>
    </div>`;
  }).join('');
}

// ── Sync to BIK ─────────────────────────────────────────────────────────
async function syncToBIK() {
  const all = await dbAll(STORE_DAYS);
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
  const cutoffStr = localDateStr(cutoff);
  const payload = {
    days: all
      .filter(d => d.date >= cutoffStr)
      .map(d => ({ date: d.date, miles: d.miles })),
  };

  if (!payload.days.length) {
    showToast('No miles to sync yet', '');
    return;
  }

  $('btnSync').disabled = true;
  $('btnSync').textContent = 'Syncing…';
  try {
    const res = await fetch(API_BASE + '/mileage-sync', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify(payload),
    });
    if (res.status === 401 || res.status === 403) {
      showToast('Auth failed — re-enter token', 'error');
      showAuthGate('Token expired');
      return;
    }
    if (!res.ok) {
      const txt = await res.text();
      throw new Error('HTTP ' + res.status + ': ' + txt.slice(0, 100));
    }
    const data = await res.json();
    for (const d of payload.days) {
      const row = await dbGet(STORE_DAYS, d.date);
      if (row) {
        row.synced = true;
        await dbPut(STORE_DAYS, row);
      }
    }
    const ts = new Date().toISOString();
    await setMeta('last_sync', ts);
    $('lastSync').textContent = new Date(ts).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    showToast(`Synced ${data.accepted || payload.days.length} days`, 'success');
    await renderDays();
  } catch (e) {
    showToast('Sync failed: ' + e.message, 'error');
  } finally {
    $('btnSync').disabled = false;
    $('btnSync').textContent = 'Sync to BIK';
  }
}

// ── Init ────────────────────────────────────────────────────────────────
async function init() {
  db = await openDB();
  const pill = $('buildPill');
  if (pill) pill.textContent = IS_NATIVE ? BUILD + ' · native' : BUILD + ' · pwa';
  await loadToday();
  await recomputeWeek();
  await renderDays();

  const minSp = await getMeta('min_speed', 3);
  $('minSpeed').value = minSp;
  $('minSpeed').addEventListener('change', () => setMeta('min_speed', parseFloat($('minSpeed').value) || 0));

  const lastSync = await getMeta('last_sync', null);
  if (lastSync) {
    $('lastSync').textContent = new Date(lastSync).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  }

  $('btnTrack').addEventListener('click', () => isTracking ? stopTracking() : startTracking());
  $('btnSync').addEventListener('click', syncToBIK);

  const wasTracking = await getMeta('was_tracking', false);
  if (wasTracking) {
    setTimeout(() => startTracking(), 500);
  }

  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && isTracking && !wakeLock && 'wakeLock' in navigator) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) { /* ignore */ }
    }
  });

  setInterval(async () => {
    const cur = localDateStr();
    if (cur !== todayDate) {
      todayDate = cur;
      await loadToday();
      await renderDays();
    }
    await recomputeWeek();
  }, 60000);
}

// ── Boot ────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js?v=2', { scope: './' }).catch(() => {});
}

checkAuth().then(ok => {
  if (ok) init().catch(e => {
    console.error(e);
    showToast('Init failed: ' + e.message, 'error');
  });
});
</script>
